  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #050505;
      color: #f0efeb;
      font-family: 'Jost', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 300;
    }

    /* bruit numérique léger */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.12; /* ajuste entre 0.05 et 0.25 */
  background-image:
    repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.08) 0,
      rgba(255,255,255,0.08) 1px,
      transparent 1px,
      transparent 3px
    ),
    repeating-linear-gradient(
      90deg,
      rgba(255,255,255,0.03) 0,
      rgba(255,255,255,0.03) 1px,
      transparent 1px,
      transparent 4px
    );
  mix-blend-mode: screen;
  animation: noiseShift 2.5s steps(4) infinite;
}

@keyframes noiseShift {
  0%   { transform: translate3d(0,   0, 0); }
  25%  { transform: translate3d(-3px, -4px, 0); }
  50%  { transform: translate3d(2px,  3px, 0); }
  75%  { transform: translate3d(-2px, 2px, 0); }
  100% { transform: translate3d(0,   0, 0); }
}
    body {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100vh;
      padding: 2.5rem;
      z-index: 1; 
      position: relative;
    }

    /* ─── HEADER ─── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    header span {
      font-weight: 500;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
    }

    header a {
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      color: #666;
      text-decoration: none;
      transition: color 0.2s;
    }

    header a:hover { color: #f0efeb; }

    /* ─── MAIN ─── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

.manifesto {
  font-size: 0.72rem;
  font-weight: 300;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #555;
  margin-top: 1rem;
}

    .logo-wrap img {
      width: auto;
      height: auto;
      max-height: 240px;
      max-width: 240px;
    }

    /* ─── FOOTER ─── */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .projects-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .projects-list li {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
      transition: color 0.2s;
      cursor: default;
    }

    .projects-list li:hover { color: #f0efeb; }

    .projects-list a {
      text-decoration: none;
      color: inherit;
    }


    .copyright {
      font-size: 0.75rem;
     font-weight: 300;
     letter-spacing: 0.04em;
      color: #333;
    }
    .contact-wrap a {
      font-weight: 500;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      color: #f0efeb;
      text-decoration: none;
      border-bottom: 1px solid #333;
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }

    .contact-wrap a:hover { border-color: #f0efeb; }

    @media (max-width: 540px) {
      body { padding: 1.5rem; }
      footer { flex-direction: column; gap: 2rem; align-items: flex-start; }
    }

canvas#bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  </style>
</head>
<body>

  <header>
    <span>cabinet26</span>
    <a href="mailto:contact@cabinet26.com">contact</a>
  </header>

  <main>
    <div class="logo-wrap">
      <img src="c26_w_txt.png" alt="cabinet26" />
    </div>
    <p class="manifesto">transmission pop-culturelle.</p>
  </main>

  <footer>
    <ul class="projects-list">
      <li><a href="https://ludokino.net" target="_blank">Ludokino</a></li>
      <li><a href="https://toonesque.com" target="_blank">toonesque.</a></li>
      <li>Caligosto &amp; Don Skellington</li>
    </ul>
    <span class="copyright">© cabinet26</span>
  </footer>

</body>
<canvas id="bg"></canvas>
